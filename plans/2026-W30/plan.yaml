# demand.json / index.html / journal.json są GENEROWANE z tego pliku + kart recipes/.
#
# Model porcji: 1 porcja = 200 g mięsa; danie = base_servings (2) × 200 g = 400 g.
# Dzieci jedzą łącznie ~0,5–0,75 porcji (ciężko dzielić) → nadwyżkę do lodówki/mrożenia.
# Per-danie można nadpisać `servings` (np. batch na zapas: pulpeciki servings 3 = 600 g).
#
# Tydzień wydłużony, start dziś (Czw 23.07 = ISO 2026-W30). Łosoś na dziś.
# Zamówione mięso z 4-dniową ważnością (gotować do ~Pn 27.07); zasada: jak ma się zepsuć,
# zrób więcej i zamroź.
#   - indyk 600 g → pulpeciki jako 1 batch (servings 3 = 600 g); zjeść 2 porcje, resztę zamrozić.
#   - łopatka 2×400 g → kotlety (Pt, 1 tacka) + sos (Pn, 1 tacka, OSOBNO — nie musi iść z kotletami).
#     Sos zasila 2× makaron fusilli (Pn, Wt).
# Niedziela: obiad w restauracji. Ogon Czw 30.07–Nd 02.08: do zaplanowania (domówienie).
